name: Build Android APK

# Runs automatically on every push to main, and can also be triggered
# manually from the Actions tab in GitHub ("Run workflow" button).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install npm dependencies
        run: npm install

      - name: Build Angular web app
        run: npx ng build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      # Uploads the finished APK as a downloadable artifact on the
      # "Actions" tab of your GitHub repo, under this workflow run.
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: discipline-tracker-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
